<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attiguppe RWA — Funds & Claims Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
:root{
  --paper:#F3EFE6; --paper-2:#ECE6D7; --card:#FFFFFF;
  --ink:#1B2420; --ink-2:#4C564F; --ink-3:#838B83;
  --line:#E7E0D1; --line-2:#D9D0BD;
  --green:#2F5D4A;
  --green-d:color-mix(in srgb,var(--green) 80%,#000);
  --green-l:color-mix(in srgb,var(--green) 55%,#fff);
  --green-bg:color-mix(in srgb,var(--green) 10%,#fff);
  --terra:#C2622D;
  --terra-d:color-mix(in srgb,var(--terra) 82%,#000);
  --terra-bg:color-mix(in srgb,var(--terra) 13%,#fff);
  --gold:#B0822A; --gold-bg:#F6EEDC;
  --danger:#B23F2E; --danger-bg:#F8E7E2;
  --amber:#B07A1B; --amber-bg:#F7EFDD;
  --success:#2C7A4E; --success-bg:#E6F1E9;
  --r:15px; --r-sm:10px; --r-pill:999px;
  --fd:'Bricolage Grotesque',serif; --fb:'Hanken Grotesk',sans-serif;
  --sh-sm:0 1px 2px rgba(36,40,30,.05),0 1px 3px rgba(36,40,30,.04);
  --sh:0 2px 4px rgba(36,40,30,.04),0 6px 16px rgba(36,40,30,.06);
  --sh-lg:0 12px 40px rgba(28,32,24,.16);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:var(--fb);background:var(--paper);color:var(--ink);
  -webkit-font-smoothing:antialiased;font-size:15px;line-height:1.5;}
h1,h2,h3,h4{font-family:var(--fd);font-weight:700;margin:0;letter-spacing:-.01em;line-height:1.12;}
.num,.hero-amt,.stat-value,.cc-amt,.detail-amt,.sf-amt,.ch-amt,.sp-amt,.feed-amt,.donut-value,.dues-pct{font-variant-numeric:tabular-nums;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,textarea,select{font-family:inherit;font-size:inherit;color:inherit;}
.icon{flex:none;}

/* ---------- App layout ---------- */
.app{display:grid;grid-template-columns:256px 1fr;min-height:100vh;}
.sidebar{position:sticky;top:0;height:100vh;background:var(--green-d);
  color:#EAF0EA;display:flex;flex-direction:column;padding:22px 16px;gap:8px;
  background-image:linear-gradient(180deg,#284035,#1d342a);}
.brand{display:flex;align-items:center;gap:12px;padding:6px 8px 18px;}
.brand-seal{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.1);
  display:grid;place-items:center;color:#EBD9C2;border:1px solid rgba(255,255,255,.12);}
.brand-text{display:flex;flex-direction:column;}
.brand-name{font-family:var(--fd);font-weight:700;font-size:17px;letter-spacing:-.01em;}
.brand-sub{font-size:11.5px;color:rgba(234,240,234,.6);letter-spacing:.02em;}
.nav{display:flex;flex-direction:column;gap:3px;margin-top:4px;}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:11px;
  color:rgba(234,240,234,.72);text-align:left;position:relative;transition:.15s;}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff;}
.nav-item.on{background:rgba(255,255,255,.12);color:#fff;}
.nav-item.on::before{content:"";position:absolute;left:-16px;top:9px;bottom:9px;width:3px;border-radius:3px;background:var(--terra);}
.ni-text{display:flex;flex-direction:column;line-height:1.2;}
.ni-label{font-weight:600;font-size:14.5px;}
.ni-sub{font-size:11px;color:rgba(234,240,234,.5);}
.nav-item.on .ni-sub{color:rgba(234,240,234,.62);}
.ni-badge{margin-left:auto;background:var(--terra);color:#fff;font-size:11px;font-weight:700;
  min-width:20px;height:20px;border-radius:10px;display:grid;place-items:center;padding:0 6px;}
.side-funds{margin-top:auto;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
  border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:2px;}
.sf-label{font-size:11.5px;color:rgba(234,240,234,.6);letter-spacing:.03em;text-transform:uppercase;}
.sf-amt{font-family:var(--fd);font-weight:700;font-size:24px;color:#fff;}
.sf-sub{font-size:11.5px;color:rgba(234,240,234,.55);}

.main{display:flex;flex-direction:column;min-width:0;}
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;
  gap:16px;padding:18px 30px;background:rgba(243,239,230,.85);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);}
.tb-title h1{font-size:22px;}
.tb-title p{margin:2px 0 0;color:var(--ink-3);font-size:13px;}
.tb-right{display:flex;align-items:center;gap:12px;}
.icon-btn{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;color:var(--ink-2);
  border:1px solid var(--line);background:var(--card);transition:.15s;position:relative;}
.icon-btn:hover{border-color:var(--line-2);color:var(--ink);}
.icon-btn.ghost{background:transparent;}
.bell-dot{position:absolute;top:9px;right:10px;width:7px;height:7px;border-radius:50%;background:var(--terra);border:2px solid var(--paper);}

/* role switcher */
.role-switch{position:relative;}
.rs-trigger{display:flex;align-items:center;gap:10px;padding:6px 12px 6px 6px;border-radius:var(--r-pill);
  background:var(--card);border:1px solid var(--line);transition:.15s;}
.rs-trigger:hover{border-color:var(--green-l);box-shadow:var(--sh-sm);}
.rs-meta{display:flex;flex-direction:column;line-height:1.15;text-align:left;}
.rs-role{font-weight:700;font-size:13.5px;}
.rs-name{font-size:11.5px;color:var(--ink-3);}
.rs-chev{color:var(--ink-3);}
.rs-backdrop{position:fixed;inset:0;z-index:30;}
.rs-menu{position:absolute;right:0;top:52px;z-index:40;width:300px;background:var(--card);
  border:1px solid var(--line);border-radius:16px;box-shadow:var(--sh-lg);padding:8px;}
.rs-menu-head{display:flex;justify-content:space-between;align-items:center;padding:8px 10px 10px;
  font-size:12px;color:var(--ink-3);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.rs-menu-head span{color:var(--terra);background:var(--terra-bg);padding:2px 8px;border-radius:8px;font-size:10px;}
.rs-opt{display:flex;align-items:center;gap:11px;width:100%;padding:9px 10px;border-radius:11px;text-align:left;transition:.12s;}
.rs-opt:hover{background:var(--paper);}
.rs-opt.on{background:var(--green-bg);}
.rs-opt-meta{display:flex;flex-direction:column;line-height:1.2;}
.rs-opt-role{font-weight:600;font-size:14px;display:flex;align-items:center;gap:6px;}
.rs-opt-name{font-size:12px;color:var(--ink-3);}
.rs-opt-count{margin-left:auto;background:var(--amber-bg);color:var(--amber);font-weight:700;font-size:11.5px;
  min-width:22px;height:22px;border-radius:11px;display:grid;place-items:center;}
.rs-opt.on .rs-opt-count{margin-left:auto;}
.rs-check{color:var(--green);margin-left:8px;}
.final-tag{font-style:normal;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;
  color:var(--terra);background:var(--terra-bg);padding:1px 6px;border-radius:6px;margin-left:6px;}

.content{padding:26px 30px 60px;max-width:1240px;width:100%;}
.view{display:flex;flex-direction:column;gap:22px;}

/* ---------- Cards / atoms ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-sm);}
.card-pad{padding:20px;}
.soft-panel{background:linear-gradient(180deg,#FBF9F3,#F6F2E8);}
.sec-title{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:16px;}
.sec-title h3{font-size:17px;}
.kicker{font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--terra);margin-bottom:4px;}
.kicker.light{color:rgba(235,217,194,.85);}

.badge{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700;
  padding:3px 9px;border-radius:var(--r-pill);letter-spacing:.01em;white-space:nowrap;}
.badge.neutral{background:var(--paper-2);color:var(--ink-2);}
.badge.success,.badge.success.soft{background:var(--success-bg);color:var(--success);}
.badge.amber,.badge.amber.soft{background:var(--amber-bg);color:var(--amber);}
.badge.danger,.badge.danger.soft{background:var(--danger-bg);color:var(--danger);}
.badge.gold,.badge.gold.soft{background:var(--gold-bg);color:var(--gold);}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-weight:600;
  border-radius:var(--r-sm);transition:.15s;white-space:nowrap;border:1px solid transparent;}
.btn-md{padding:9px 16px;font-size:14px;}
.btn-sm{padding:6px 11px;font-size:12.5px;border-radius:9px;}
.btn-full{width:100%;}
.btn-primary{background:var(--green);color:#fff;box-shadow:0 1px 2px rgba(35,71,57,.3);}
.btn-primary:hover{background:var(--green-d);}
.btn-soft{background:var(--green-bg);color:var(--green);}
.btn-soft:hover{background:#dfe9e1;}
.btn-ghost{background:transparent;color:var(--ink-2);border-color:var(--line);}
.btn-ghost:hover{background:var(--card);border-color:var(--line-2);color:var(--ink);}
.btn-danger{background:var(--danger);color:#fff;}
.btn-danger:hover{background:#9a3525;}
.btn-soft-danger{background:var(--danger-bg);color:var(--danger);}
.btn-soft-danger:hover{background:#f3dad2;}
.btn:disabled{opacity:.45;cursor:not-allowed;}

.avatar{display:inline-grid;place-items:center;border-radius:50%;font-family:var(--fd);font-weight:600;color:#fff;flex:none;}
.av-a{background:#3E6B57;} .av-b{background:#B0822A;} .av-c{background:#A4501E;} .av-d{background:#5E7E8C;} .av-e{background:#8A5A4E;}

/* ---------- Overview ---------- */
.overview-grid{display:grid;grid-template-columns:1.05fr 1.5fr;gap:18px;}
.hero-balance{background:linear-gradient(150deg,#2F5D4A,#234739 70%);color:#EAF0EA;border:none;overflow:hidden;position:relative;}
.hero-balance::after{content:"";position:absolute;right:-40px;top:-40px;width:200px;height:200px;border-radius:50%;background:rgba(194,98,45,.16);}
.hero-inner{padding:22px;position:relative;z-index:1;display:flex;flex-direction:column;height:100%;gap:14px;}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;}
.hero-amt{font-family:var(--fd);font-weight:800;font-size:42px;line-height:1;margin:6px 0 4px;letter-spacing:-.02em;}
.hero-sub{font-size:12.5px;color:rgba(234,240,234,.65);}
.hero-seal{width:42px;height:42px;border-radius:12px;background:rgba(255,255,255,.1);display:grid;place-items:center;color:#EBD9C2;}
.spark{width:100%;height:56px;margin-top:auto;}
.spark-area{fill:rgba(235,217,194,.14);}
.spark-line{fill:none;stroke:#EBD9C2;stroke-width:2;}
.spark-dot{fill:#fff;}
.hero-foot{display:flex;gap:8px;padding-top:14px;border-top:1px solid rgba(255,255,255,.13);}
.hf-item{flex:1;display:flex;flex-direction:column;gap:3px;}
.hf-label{font-size:11px;color:rgba(234,240,234,.6);text-transform:uppercase;letter-spacing:.04em;}
.hf-val{font-weight:700;font-size:14.5px;display:flex;align-items:center;gap:3px;font-variant-numeric:tabular-nums;}
.hf-val.up{color:#A9D8B6;} .hf-val.down{color:#EBB69A;}

.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;}
.stat-row.five{grid-template-columns:repeat(5,1fr);}
.stat{display:flex;flex-direction:column;gap:8px;}
.stat-accent{background:var(--terra-bg);border-color:#EAD3BF;}
.stat-top{display:flex;justify-content:space-between;align-items:center;}
.stat-label{font-size:12.5px;color:var(--ink-3);font-weight:600;}
.stat-ico{color:var(--green);opacity:.7;}
.stat-accent .stat-ico{color:var(--terra);}
.stat-value{font-family:var(--fd);font-weight:700;font-size:27px;line-height:1;letter-spacing:-.01em;}
.stat-foot{display:flex;align-items:center;gap:8px;}
.trend{display:inline-flex;align-items:center;gap:2px;font-size:12px;font-weight:700;}
.trend.up{color:var(--success);} .trend.down{color:var(--terra);}
.stat-sub{font-size:12px;color:var(--ink-3);}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.two-col.col-65{grid-template-columns:1.55fr 1fr;}

.legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px;}
.lg{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink-2);font-weight:500;}
.lg i{width:11px;height:11px;border-radius:3px;display:inline-block;}

/* stacked bars */
.stackbars{display:flex;align-items:flex-end;gap:14px;padding-top:10px;}
.sb-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end;}
.sb-stack{width:62%;max-width:46px;flex:1 1 auto;display:flex;flex-direction:column-reverse;justify-content:flex-start;border-radius:6px 6px 0 0;overflow:hidden;min-height:4px;}
.sb-seg{width:100%;flex:none;transition:height .4s;}
.sb-label{font-size:12px;color:var(--ink-3);font-weight:600;}

/* donut + categories */
.spend-split{display:flex;gap:22px;align-items:center;flex-wrap:wrap;}
.donut-wrap{position:relative;flex:none;}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.donut-value{font-family:var(--fd);font-weight:700;font-size:22px;}
.donut-label{font-size:11px;color:var(--ink-3);}
.cat-legend{flex:1;min-width:200px;display:flex;flex-direction:column;gap:9px;}
.cl-row{display:grid;grid-template-columns:14px 1fr auto;align-items:center;gap:9px;font-size:13px;}
.cl-row:has(.cl-bar){grid-template-columns:14px 1.1fr 1fr auto;}
.cl-dot{width:11px;height:11px;border-radius:3px;}
.cl-name{color:var(--ink-2);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cl-bar{height:6px;background:var(--paper-2);border-radius:3px;overflow:hidden;}
.cl-bar i{display:block;height:100%;border-radius:3px;}
.cl-pct{color:var(--ink-3);font-size:12px;font-variant-numeric:tabular-nums;}
.cl-val{font-weight:700;font-variant-numeric:tabular-nums;}

/* feed */
.feed{display:flex;flex-direction:column;}
.feed-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid var(--line);}
.feed-row:first-child{border-top:none;}
.feed-ico{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;flex:none;}
.feed-ico.ok{background:var(--success-bg);color:var(--success);}
.feed-ico.bad{background:var(--danger-bg);color:var(--danger);}
.feed-ico.neutral{background:var(--paper-2);color:var(--ink-2);}
.feed-body{flex:1;min-width:0;display:flex;flex-direction:column;}
.feed-main{font-size:13.5px;}
.feed-sub{font-size:12px;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.feed-amt{font-weight:700;font-variant-numeric:tabular-nums;font-size:13.5px;}
.feed-date{font-size:12px;color:var(--ink-3);width:46px;text-align:right;flex:none;}

/* pipeline mini */
.pipeline-mini{display:flex;flex-direction:column;gap:6px;}
.pm-row{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:11px;text-align:left;transition:.12s;border:1px solid transparent;}
.pm-row:hover{background:var(--card);border-color:var(--line);}
.pm-meta{display:flex;flex-direction:column;line-height:1.2;}
.pm-role{font-weight:600;font-size:13.5px;display:flex;align-items:center;}
.pm-name{font-size:11.5px;color:var(--ink-3);}
.pm-count{margin-left:auto;min-width:24px;height:24px;border-radius:8px;display:grid;place-items:center;
  font-weight:700;font-size:13px;background:var(--paper-2);color:var(--ink-3);font-variant-numeric:tabular-nums;}
.pm-count.has{background:var(--amber-bg);color:var(--amber);}
.pm-note{font-size:12px;color:var(--ink-3);display:flex;gap:6px;align-items:flex-start;margin:14px 0 0;line-height:1.4;}
.pm-note .icon{margin-top:1px;flex:none;color:var(--green-l);}

/* ---------- Claims ---------- */
.role-banner{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;
  background:linear-gradient(120deg,#FBF9F3,#F4EFE4);border:1px solid var(--line);border-radius:var(--r);padding:16px 20px;}
.rb-left{display:flex;align-items:center;gap:14px;}
.rb-role{font-size:14.5px;}
.rb-role b{font-family:var(--fd);}
.rb-name{font-size:12.5px;color:var(--ink-3);margin-top:1px;}
.rb-actions{display:flex;gap:10px;}

.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);}
.tabs.inline{border:none;}
.tab{display:flex;align-items:center;gap:7px;padding:10px 14px;font-weight:600;font-size:14px;color:var(--ink-3);
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s;}
.tab:hover{color:var(--ink);}
.tab.on{color:var(--green);border-color:var(--green);}
.tabs.inline .tab{border-radius:9px;border:1px solid transparent;margin:0;}
.tabs.inline .tab.on{background:var(--green-bg);border-color:transparent;}
.tab-count{font-size:11.5px;background:var(--paper-2);color:var(--ink-2);padding:1px 7px;border-radius:8px;font-weight:700;}
.tab.on .tab-count{background:var(--green);color:#fff;}

.claim-list{display:flex;flex-direction:column;gap:14px;}
.claim-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-sm);overflow:hidden;transition:.15s;}
.claim-card:hover{box-shadow:var(--sh);border-color:var(--line-2);}
.cc-main{display:flex;gap:14px;padding:16px 18px;cursor:pointer;align-items:flex-start;}
.cc-cat{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;flex:none;}
.cc-body{flex:1;min-width:0;}
.cc-top{display:flex;align-items:center;gap:9px;margin-bottom:4px;flex-wrap:wrap;}
.cc-id{font-weight:700;font-size:12.5px;color:var(--ink-3);font-variant-numeric:tabular-nums;white-space:nowrap;}
.cc-type{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;padding:1px 7px;border-radius:6px;white-space:nowrap;}
.cc-type.recurring{background:var(--green-bg);color:var(--green);}
.cc-type.one-time{background:var(--paper-2);color:var(--ink-2);}
.cc-title{font-size:16px;margin:0 0 5px;}
.cc-meta{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink-3);flex-wrap:wrap;}
.cc-meta i{font-style:normal;opacity:.5;}
.cc-attach{display:inline-flex;align-items:center;gap:3px;background:var(--paper);padding:1px 7px;border-radius:6px;color:var(--ink-2);}
.cc-amt{font-family:var(--fd);font-weight:700;font-size:21px;flex:none;}
.cc-foot{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:12px 18px;
  background:var(--paper);border-top:1px solid var(--line);flex-wrap:wrap;}
.cc-actions{display:flex;gap:8px;}
.cc-view{display:flex;align-items:center;gap:3px;font-weight:600;font-size:13px;color:var(--green);}

/* stepper */
.stepper{display:flex;align-items:center;flex:1;min-width:0;}
.step{display:flex;align-items:center;position:relative;}
.stepper:not(.stepper-compact) .step{flex:1;}
.step-node{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;flex:none;
  background:var(--paper-2);color:var(--ink-3);border:2px solid transparent;font-size:11px;font-weight:700;z-index:1;}
.step-num{font-size:11px;}
.st-done .step-node{background:var(--green);color:#fff;}
.st-active .step-node{background:#fff;border-color:var(--terra);color:var(--terra);box-shadow:0 0 0 3px var(--terra-bg);}
.st-rejected .step-node{background:var(--danger);color:#fff;}
.step-bar{height:2px;flex:1;background:var(--paper-2);margin:0 4px;min-width:14px;}
.st-done .step-bar{background:var(--green-l);}
.step-label{font-size:11.5px;color:var(--ink-3);margin:0 8px 0 6px;white-space:nowrap;font-weight:500;}
.st-active .step-label{color:var(--terra);font-weight:700;}
.st-done .step-label{color:var(--ink-2);}
.stepper-compact .step-label{display:none;}

/* ---------- Modal ---------- */
.modal-overlay{position:fixed;inset:0;background:rgba(27,36,32,.42);backdrop-filter:blur(3px);
  z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;}
.modal{background:var(--card);border-radius:20px;width:100%;max-width:540px;box-shadow:var(--sh-lg);
  animation:pop .22s cubic-bezier(.2,.9,.3,1);}
.modal-wide{max-width:820px;}
@keyframes pop{from{opacity:0;transform:translateY(14px) scale(.98);}to{opacity:1;transform:none;}}
.modal-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;padding:22px 24px 16px;border-bottom:1px solid var(--line);}
.modal-head h2{font-size:21px;}
.modal-sub{margin:5px 0 0;color:var(--ink-3);font-size:13px;}
.modal-body{padding:22px 24px;}
.modal-foot{padding:16px 24px;border-top:1px solid var(--line);background:var(--paper);border-radius:0 0 20px 20px;}

/* detail */
.detail-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:26px;}
.detail-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.d-tag{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:3px 9px;border-radius:var(--r-pill);}
.d-tag.plain{background:var(--paper-2);color:var(--ink-2);}
.detail-amt{font-family:var(--fd);font-weight:800;font-size:34px;letter-spacing:-.02em;}
.detail-desc{color:var(--ink-2);font-size:14px;line-height:1.55;margin:10px 0 18px;}
.attach-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px;}
.attach{display:flex;gap:11px;align-items:center;border:1px solid var(--line);border-radius:12px;padding:10px;}
.attach.missing{opacity:.6;border-style:dashed;}
.attach-thumb{width:48px;height:48px;border-radius:9px;background:var(--green-bg);color:var(--green);display:grid;place-items:center;flex:none;}
.attach.missing .attach-thumb{background:var(--paper-2);color:var(--ink-3);}
.attach-none{font-size:11px;text-transform:uppercase;letter-spacing:.04em;}
.attach-label{font-size:12.5px;font-weight:600;display:block;}
.attach-state{font-size:11.5px;color:var(--ink-3);}
.detail-stepper{padding:6px 0;}
.detail-right{border-left:1px solid var(--line);padding-left:26px;}

.timeline{display:flex;flex-direction:column;}
.tl-item{display:flex;gap:12px;position:relative;padding-bottom:18px;}
.tl-item::before{content:"";position:absolute;left:13px;top:26px;bottom:-2px;width:2px;background:var(--line);}
.tl-item:last-child::before{display:none;}
.tl-node{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;flex:none;background:var(--green-bg);color:var(--green);z-index:1;}
.tl-rejected .tl-node{background:var(--danger-bg);color:var(--danger);}
.tl-raised .tl-node{background:var(--paper-2);color:var(--ink-2);}
.tl-pending .tl-node{background:#fff;border:2px dashed var(--line-2);color:var(--ink-3);}
.tl-disbursed .tl-node{background:var(--terra-bg);color:var(--terra);}
.tl-head{display:flex;justify-content:space-between;gap:8px;align-items:baseline;}
.tl-head b{font-size:14px;}
.tl-date{font-size:11.5px;color:var(--ink-3);flex:none;}
.tl-role{font-size:12px;color:var(--ink-3);}
.tl-note{font-size:12.5px;color:var(--ink-2);background:var(--paper);border-radius:8px;padding:6px 9px;margin-top:6px;font-style:italic;}
.tl-note.bad{background:var(--danger-bg);color:var(--danger);}

.detail-act-bar{display:flex;align-items:center;gap:10px;width:100%;flex-wrap:wrap;}
.detail-act-bar .input{flex:1;min-width:160px;}
.dab-note{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--ink-2);margin-right:auto;}
.dab-note .icon{color:var(--green-l);}

/* forms */
.form-grid{display:flex;flex-direction:column;gap:16px;}
.form-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.field{display:flex;flex-direction:column;gap:6px;}
.field-label{font-size:13px;font-weight:600;color:var(--ink);}
.field-label em{color:var(--terra);font-style:normal;margin-left:2px;}
.field-hint{font-size:11.5px;color:var(--ink-3);}
.input{width:100%;border:1px solid var(--line-2);border-radius:var(--r-sm);padding:10px 12px;font-size:14px;
  background:#fff;transition:.15s;}
.input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-bg);}
.textarea{resize:vertical;min-height:64px;line-height:1.5;}
.select-wrap{position:relative;}
.select{appearance:none;padding-right:36px;cursor:pointer;}
.select-chev{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--ink-3);pointer-events:none;}

.segmented{display:inline-flex;background:var(--paper-2);border-radius:11px;padding:3px;gap:3px;flex-wrap:wrap;}
.seg{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-weight:600;font-size:13px;color:var(--ink-2);transition:.12s;}
.seg.on{background:#fff;color:var(--green);box-shadow:var(--sh-sm);}

.cat-pick{display:flex;flex-wrap:wrap;gap:8px;}
.cat-chip{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:10px;border:1px solid var(--line-2);
  font-size:13px;font-weight:600;color:var(--ink-2);transition:.12s;}
.cat-chip:hover{border-color:var(--ink-3);}

.filedrop{display:flex;align-items:center;gap:9px;width:100%;padding:11px 13px;border-radius:var(--r-sm);
  border:1.5px dashed var(--line-2);color:var(--ink-3);font-weight:600;font-size:13px;transition:.15s;}
.filedrop:hover{border-color:var(--green-l);color:var(--green);}
.filedrop.filled{border-style:solid;border-color:var(--green);background:var(--green-bg);color:var(--green);}

.form-foot,.ff-btns{display:flex;align-items:center;gap:10px;}
.form-foot{justify-content:space-between;flex-wrap:wrap;}
.ff-note{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-3);}
.ff-note .icon{color:var(--green-l);}
.ff-btns{margin-left:auto;}

/* sponsorship */
.sponsor-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:24px;}
.sponsor-grid>div:first-child{display:flex;flex-direction:column;gap:14px;}
.qr-panel{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:18px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:6px;}
.qr-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--terra);}
.qr-box{width:140px;height:140px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px;margin:4px 0;}
.qr-svg{width:100%;height:100%;fill:var(--ink);}
.qr-vpa{font-weight:700;font-size:13px;font-variant-numeric:tabular-nums;}
.qr-amt{font-family:var(--fd);font-weight:700;font-size:20px;color:var(--green);}
.qr-note{font-size:11.5px;color:var(--ink-3);line-height:1.4;margin:4px 0 0;}

/* empty */
.empty{display:flex;flex-direction:column;align-items:center;text-align:center;padding:40px 20px;gap:8px;}
.empty-ico{width:54px;height:54px;border-radius:16px;background:var(--green-bg);color:var(--green);display:grid;place-items:center;}
.empty-title{font-family:var(--fd);font-weight:700;font-size:16px;}
.empty-sub{font-size:13px;color:var(--ink-3);max-width:340px;line-height:1.5;}

/* ---------- Members ---------- */
.members-toolbar{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap;}
.mt-right{display:flex;gap:10px;align-items:center;}
.search{display:flex;align-items:center;gap:8px;background:var(--paper);border:1px solid var(--line-2);border-radius:var(--r-sm);padding:8px 12px;color:var(--ink-3);}
.search input{border:none;background:none;outline:none;width:150px;font-size:13.5px;color:var(--ink);}
.filter-chips{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.fc-label{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--ink-3);margin-right:2px;}
.chip{padding:5px 12px;border-radius:var(--r-pill);font-size:12.5px;font-weight:600;background:var(--paper-2);color:var(--ink-2);transition:.12s;}
.chip:hover{background:#e4ddcd;}
.chip.on{background:var(--green);color:#fff;}
.fc-count{margin-left:auto;font-size:12px;color:var(--ink-3);}

.mtable{display:flex;flex-direction:column;}
.mt-head,.mt-row{display:grid;grid-template-columns:2.4fr 1fr 1.1fr 1.1fr 1fr;align-items:center;gap:12px;}
.mt-head{padding:8px 6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);border-bottom:1px solid var(--line);}
.mt-row{padding:11px 6px;border-bottom:1px solid var(--line);}
.mt-row:last-child{border-bottom:none;}
.mt-member{display:flex;align-items:center;gap:11px;}
.mt-meta{display:flex;flex-direction:column;min-width:0;}
.mt-name{font-weight:600;font-size:14px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.role-pill{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--green);background:var(--green-bg);padding:1px 6px;border-radius:6px;}
.mt-sub{font-size:12px;color:var(--ink-3);font-variant-numeric:tabular-nums;}
.type-tag{font-size:12px;font-weight:700;padding:3px 10px;border-radius:var(--r-pill);}
.type-tag.lifetime{background:var(--green-bg);color:var(--green);}
.type-tag.annual{background:var(--terra-bg);color:var(--terra);}
.mt-date{font-size:13px;color:var(--ink-2);}
.mt-action{display:flex;justify-content:flex-end;}

.side-col{display:flex;flex-direction:column;gap:18px;}
.dues-card{display:flex;flex-direction:column;}
.dues-ring{text-align:center;margin:4px 0 12px;}
.dues-pct{font-family:var(--fd);font-weight:800;font-size:46px;color:var(--green);line-height:1;}
.dues-pct-label{font-size:12px;color:var(--ink-3);}
.dues-bar{height:9px;background:var(--paper-2);border-radius:5px;overflow:hidden;margin-bottom:14px;}
.dues-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--green-l),var(--green));border-radius:5px;}
.dues-rows{display:flex;flex-direction:column;gap:8px;}
.dues-rows div{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-2);}
.dues-rows b{margin-left:auto;font-variant-numeric:tabular-nums;color:var(--ink);}
.dot{width:9px;height:9px;border-radius:50%;}
.dot.ok{background:var(--green);} .dot.warn{background:var(--amber);}
.dues-counts{display:flex;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line);}
.dues-counts span{flex:1;font-size:12.5px;color:var(--ink-3);}
.dues-counts b{font-family:var(--fd);font-size:18px;color:var(--ink);display:block;}
.mix-bar{display:flex;height:14px;border-radius:7px;overflow:hidden;margin-bottom:14px;background:var(--paper-2);}
.mix-life{background:var(--green);} .mix-ann{background:var(--terra);}

/* ---------- Finances ---------- */
.fin-filter{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;
  background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:12px 18px;box-shadow:var(--sh-sm);}
.ff-left{display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--ink-2);}
.ff-left>.icon{color:var(--green);}
.month-select{min-width:200px;}
.period-pill{font-size:11.5px;font-weight:700;color:var(--ink-3);background:var(--paper-2);padding:3px 10px;border-radius:var(--r-pill);}

.sponsor-list{display:flex;flex-direction:column;}
.sp-row{display:flex;gap:12px;align-items:center;padding:13px 0;border-top:1px solid var(--line);}
.sp-row:first-child{border-top:none;}
.sp-ico{width:36px;height:36px;border-radius:10px;background:var(--gold-bg);color:var(--gold);display:grid;place-items:center;flex:none;}
.sp-body{flex:1;min-width:0;}
.sp-top{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:2px;}
.sp-top b{font-size:14.5px;}
.sp-type{font-size:11.5px;color:var(--ink-3);background:var(--paper);padding:1px 8px;border-radius:6px;}
.sp-obj{font-size:12.5px;color:var(--ink-2);}
.sp-right{text-align:right;flex:none;}
.sp-amt{font-family:var(--fd);font-weight:700;font-size:17px;display:block;}
.sp-date{font-size:11.5px;color:var(--ink-3);}

.charges-card .charge-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--line);}
.ch-meta{display:flex;flex-direction:column;}
.ch-name{font-weight:600;font-size:14.5px;}
.ch-sub{font-size:12px;color:var(--ink-3);}
.ch-amt{font-family:var(--fd);font-weight:700;font-size:21px;}
.ch-amt em{font-style:normal;font-size:13px;color:var(--ink-3);font-family:var(--fb);margin-left:3px;}
.ch-amt.custom{color:var(--terra);font-size:16px;}
.charge-note{display:flex;gap:7px;align-items:flex-start;font-size:12px;color:var(--ink-3);margin:14px 0 0;line-height:1.4;}
.charge-note .icon{margin-top:1px;flex:none;color:var(--green-l);}
.charge-info{display:flex;gap:8px;align-items:flex-start;font-size:12.5px;color:var(--ink-2);background:var(--paper);border-radius:10px;padding:11px;line-height:1.45;}
.charge-info .icon{margin-top:1px;flex:none;color:var(--green-l);}

/* ---------- Toast ---------- */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);z-index:200;
  display:flex;align-items:center;gap:10px;background:var(--ink);color:#fff;padding:12px 18px;
  border-radius:var(--r-pill);box-shadow:var(--sh-lg);font-weight:600;font-size:14px;
  animation:toastin .3s cubic-bezier(.2,.9,.3,1);}
@keyframes toastin{from{opacity:0;transform:translate(-50%,16px);}to{opacity:1;transform:translate(-50%,0);}}
.toast .icon{color:#9FD8B2;}
.toast-danger .icon{color:#F0A48C;}
.toast-success .icon{color:#9FD8B2;}

/* mobile bottom nav */
.botnav{display:none;}

/* ---------- Responsive ---------- */
@media(max-width:1080px){
  .overview-grid{grid-template-columns:1fr;}
  .stat-row{grid-template-columns:repeat(2,1fr);}
  .stat-row.five{grid-template-columns:repeat(3,1fr);}
  .two-col,.two-col.col-65{grid-template-columns:1fr;}
  .detail-grid{grid-template-columns:1fr;}
  .detail-right{border-left:none;padding-left:0;border-top:1px solid var(--line);padding-top:18px;}
}
@media(max-width:760px){
  .app{grid-template-columns:1fr;}
  .sidebar{display:none;}
  .content{padding:18px 16px 90px;}
  .topbar{padding:14px 16px;}
  .tb-title h1{font-size:18px;}
  .tb-title p{display:none;}
  .rs-meta{display:none;}
  .stat-row,.stat-row.five{grid-template-columns:repeat(2,1fr);}
  .form-2,.sponsor-grid,.attach-row{grid-template-columns:1fr;}
  .modal-overlay{padding:0;align-items:flex-end;}
  .modal{max-width:100%;border-radius:20px 20px 0 0;}
  .rb-actions{width:100%;}
  .rb-actions .btn{flex:1;}
  .cc-amt{font-size:18px;}
  .botnav{display:flex;position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--card);
    border-top:1px solid var(--line);padding:8px 6px env(safe-area-inset-bottom);}
  .bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;
    color:var(--ink-3);font-size:11px;font-weight:600;position:relative;}
  .bn-item.on{color:var(--green);}
  .bn-badge{position:absolute;top:2px;right:50%;margin-right:-22px;background:var(--terra);color:#fff;
    font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:grid;place-items:center;padding:0 4px;}
  .rs-menu{position:fixed;top:auto;bottom:0;left:0;right:0;width:100%;border-radius:18px 18px 0 0;}
}
@media(max-width:440px){
  .stat-row,.stat-row.five{grid-template-columns:1fr;}
  .cc-main{flex-wrap:wrap;}
}
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/App.jsx"></script>
